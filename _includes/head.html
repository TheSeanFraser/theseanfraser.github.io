<head>
  <meta charset="utf-8">
  <link rel="shortcut icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet"> 
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

  <!-- Add cookie consent css & js -->
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/cookieconsent@3/build/cookieconsent.min.css" />

<script src="https://cdn.jsdelivr.net/npm/cookieconsent@3/build/cookieconsent.min.js" data-cfasync="false"></script>

<script>
    function getCookie(name) {
        var b = document.cookie.match('(^|[^;]+)\\s*' + name + '\\s*=\\s*([^;]+)');
        return b ? b.pop() : '';
    }

    // This function only fires when the user gives the green light
    function loadAndStartAnalytics() {
        if (window.gaLoaded) return; 

        var script = document.createElement('script');
        script.async = true;
        script.src = 'https://www.googletagmanager.com/gtag/js?id=G-ZZDDQMX470';
        document.head.appendChild(script);

        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-ZZDDQMX470');
        
        window.gaLoaded = true;
    }

    window.addEventListener("load", function () {
        const cookieConsent = getCookie('cookieconsent_status');

        // Fire analytics if already consented
        if (cookieConsent === 'allow') {
            loadAndStartAnalytics();
        }

        window.cookieconsent.initialise({
            "palette": {
                "popup": { "background": "#efefef", "text": "#404040" },
                "button": { "background": "#8ec760", "text": "#ffffff" }
            },
            "type": "opt-in",
            "content": {
                "message": "This website uses cookies to ensure you get the best experience.",
                "allow": "Accept Cookies",
                "deny": "Decline",
                "link": "Learn more",
                "href": "/privacy-policy" // Change this to your actual link!
            },
            onInitialise: function (status) {
                if (status === 'allow') loadAndStartAnalytics();
            },
            onStatusChange: function (status) {
                if (status === 'allow') loadAndStartAnalytics();
                if (status === 'deny') {
                    // Logic to clear GA cookies if they opt out later
                    document.cookie = "_ga=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                }
            }
        });
    });
</script>
</head>
